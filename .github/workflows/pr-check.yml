name: Kotlin Lint & Build Check

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Lint & Build
        run: |
          ./gradlew lintKotlin build --parallel --build-cache --no-daemon

      - name: Auto Merge (Rebase)
        if: success() && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == 'Ringoame196'
        run: |
          curl -L \
            -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/merge \
            -d '{"merge_method": "merge"}'
